name: alchemrest/ci

on:
  push:
    branches:
      - main
    paths:
      - alchemrest/**
      - .github/workflows/alchemrest.yml
  pull_request:
    paths:
      - alchemrest/**
      - .github/workflows/alchemrest.yml

permissions:
  contents: read
  packages: read

defaults:
  run:
    working-directory: alchemrest

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    services:
      postgres:
        image: postgres:15.2
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: alchemrest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ruby/setup-ruby@e34163cd15f4bb403dcd72d98e295997e6a55798 # v1
        with:
          working-directory: alchemrest
          ruby-version: "3.2"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: rubocop
        run: bundle exec rubocop
      - name: sorbet
        run: bin/typecheck

  coverage:
    runs-on: ubuntu-latest
    name: Semantic Coverage (incremental)
    services:
      postgres:
        image: postgres:15.2
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: alchemrest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ruby/setup-ruby@e34163cd15f4bb403dcd72d98e295997e6a55798 # v1
        with:
          working-directory: alchemrest
          ruby-version: "3.2"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Verify mutation coverage
        run: |
          git fetch origin main --depth 1 --quiet # we need a reference for incremental mutation testing
          bundle exec mutant run --since origin/main

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ["3.2"]
        gemfile:
          - gemfiles/rails_7_2.gemfile
          - gemfiles/rails_8_0.gemfile
          - gemfiles/faraday_2.gemfile
    name: Ruby ${{ matrix.ruby }} (${{ matrix.gemfile }})
    services:
      postgres:
        image: postgres:15.2
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: alchemrest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: ruby/setup-ruby@e34163cd15f4bb403dcd72d98e295997e6a55798 # v1
        env:
          BUNDLE_GEMFILE: ${{ matrix.gemfile }}
        with:
          working-directory: alchemrest
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: rspec
        env:
          BUNDLE_GEMFILE: ${{ matrix.gemfile }}
        run: bundle exec rspec